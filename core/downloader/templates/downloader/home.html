<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Video Dwnloader</title>
    </head>
    <body>
        <h1>Video Downloader</h1>+
        <form method="post">
            {% csrf_token %}

            <label for="url">Link do video:</label><br>
            <input type="text" name="url" id="url" placeholder="Cole o link aqui" required /><br><br>

            <button type="submit">Baixar</button>
        </form>
        {% if error %}
            <p style="color:red;">{{ error }}</p>
        {% endif %}
    </body>
</html>
